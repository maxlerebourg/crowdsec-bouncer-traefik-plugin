http:
  routers:
    whoami:
      rule: "PathPrefix(`/foo`)"
      entryPoints: [web]
      service: whoami
      middlewares: [bouncer]
  services:
    whoami:
      loadBalancer:
        servers:
          - url: "http://whoami:80"
  middlewares:
    bouncer:
      plugin:
        bouncer:
          enabled: true
          crowdsecMode: stream
          updateIntervalSeconds: 3
          crowdsecLapiKey: "40796d93c2958f9e58345514e67740e5"
          forwardedHeadersTrustedIPs:
            - "172.16.0.0/12"
